name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, wasm + fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: check

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (wasm32-wasip1)
        run: cargo clippy --target wasm32-wasip1 --all-targets -- -D warnings

  test:
    name: host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install openssl-sys deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Install Rust (stable, host target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: test

      - name: cargo test --lib
        run: cargo test --lib --target x86_64-unknown-linux-gnu

  build:
    name: wasm release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: build

      - name: cargo build --release
        run: cargo build --release

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: zellij-palette-wasm
          path: target/wasm32-wasip1/release/zellij-palette.wasm
          if-no-files-found: error
          retention-days: 7
